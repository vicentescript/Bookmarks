<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOKMARKS</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" sizes="64x64" href="assets/images/favicon.png">
</head>

<body>
  <div class="parent">
    <header>
      <div class="logo-container">
        <img src="../assets/images/favicon.png" alt="Logo Bookmarks" class="header-icon">
        <span>BOOKMARKS</span>
      </div>
    </header>

    <section class="hero">
      <div class="hero-image-container">
        <img src="assets/images/hero.jpg" alt="Persona leyendo un libro" class="hero-img">
      </div>

      <div class="info-hero">
        <p>Track the pages</p>
        <p><em>Keep the <span style="color: #ffbd59;">memories</span></em></p>
        <p><strong>Quantify your curiosity</strong></p>
      </div>
    </section>

    <section class="seccion-principal">

      <div class="titulo-seccion">
        <img src="../assets/images/favicon.png" alt="Logo Bookmarks" class="section-icon">
        <h1>Biblioteca</h1>
      </div>

      <div class="mis-libros">
        <article class="caratula">
          <div class="imagen-contenedor">
            <img src="assets/images/portada1.jpg" alt="Libro 1">
          </div>
          <div class="info-libro">
            <h3>Palabras Radiantes</h3>
            <p class="autor">Brandon Sanderson</p>
          </div>
        </article>

        <article class="caratula">
          <div class="imagen-contenedor">
            <img src="assets/images/portada2.jpg" alt="Libro 2">
          </div>
          <div class="info-libro">
            <h3>Cien años de soledad</h3>
            <p class="autor">Gabriel García Márquez</p>
          </div>
        </article>

        <article class="caratula">
          <div class="imagen-contenedor">
            <img src="assets/images/portada3.jpg" alt="Libro 3">
          </div>
          <div class="info-libro">
            <h3>Galveston</h3>
            <p class="autor">Nic Pizzolato</p>
          </div>
        </article>

        <article class="caratula">
          <div class="imagen-contenedor">
            <img src="assets/images/portada4.jpg" alt="Libro 4">
          </div>
          <div class="info-libro">
            <h3>Harry Potter</h3>
            <p class="autor">J. K. Rowling</p>
          </div>
        </article>

        <article class="caratula">
          <div class="imagen-contenedor">
            <img src="assets/images/portada5.jpg" alt="Libro 4">
          </div>
          <div class="info-libro">
            <h3>Kokoro</h3>
            <p class="autor">Natsume Soseki</p>
          </div>
        </article>

      </div>
    </section>
    <aside>Menú lateral</aside>
    <footer>Pie de página</footer>
  </div>

</body>

</html>
